version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: khataloan
      POSTGRES_PASSWORD: password
      POSTGRES_DB: khataloan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://khataloan:password@db:5432/khataloan
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
